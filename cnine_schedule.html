<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CNINE Schedule Center</title>
<style>
:root{--bg:#030711;--panel:#071426;--line:#246cff;--cyan:#6ed7ff;--blue:#2f9bff;--deep:#050a17;--gold:#ffd34f;--pink:#ff5d8f;--text:#f4fbff;--muted:#9ccfff}
*{box-sizing:border-box} html,body{margin:0;max-width:100%;overflow-x:hidden} body{background:#030711;font-family:Arial,'Malgun Gothic','Noto Sans KR',sans-serif;color:var(--text)} button,input,textarea{font:inherit}.cnine-schedule{position:relative;width:100%;max-width:820px;margin:0 auto;padding:10px;background:radial-gradient(circle at top,rgba(45,145,255,.28),transparent 34%),linear-gradient(180deg,#05070d 0%,#071426 52%,#030507 100%);border:1px solid rgba(90,175,255,.45);border-radius:20px;overflow:hidden;color:#fff}.cnine-schedule:before{content:"";position:absolute;inset:-80px -80px auto auto;width:230px;height:230px;border-radius:50%;background:rgba(47,155,255,.12);filter:blur(8px);pointer-events:none}.hero{position:relative;padding:18px 12px 16px;text-align:center;border:1px solid rgba(90,175,255,.55);border-radius:18px;background:linear-gradient(135deg,rgba(25,125,255,.28),rgba(0,0,0,.70));box-shadow:0 0 18px rgba(40,145,255,.25);overflow:hidden}.hero:after{content:"";position:absolute;left:-80px;bottom:-130px;width:260px;height:260px;border-radius:50%;background:rgba(110,215,255,.11)}.top-actions{position:absolute;right:10px;top:9px;display:flex;gap:6px;z-index:5}.pill,.top-actions button{border:1px solid rgba(105,185,255,.35);background:rgba(0,18,38,.48);color:#ccecff;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:1000;line-height:1;cursor:pointer;text-decoration:none}.top-actions button:hover,.nav button:hover{filter:brightness(1.15)}.logo-box{position:relative;z-index:2;width:116px;height:116px;margin:2px auto 8px;border-radius:30px;background:rgba(255,255,255,.08);border:1px solid rgba(140,210,255,.38);display:grid;place-items:center;box-shadow:0 0 20px rgba(70,170,255,.25),inset 0 0 22px rgba(255,255,255,.05);overflow:hidden}.logo-box img{max-width:96%;max-height:96%;object-fit:contain;filter:drop-shadow(0 0 8px rgba(255,255,255,.30))}.title{position:relative;z-index:2;font-size:28px;line-height:1.05;font-weight:1000;letter-spacing:.03em;color:#fff;text-shadow:0 0 9px rgba(75,170,255,.95),0 3px 0 #002b55,0 8px 18px #000}.sub-title{position:relative;z-index:2;display:inline-block;margin-top:9px;padding:6px 12px;border-radius:999px;border:1px solid rgba(105,185,255,.55);background:rgba(0,18,38,.50);font-size:12px;font-weight:900;color:#fff}.month-line{position:relative;z-index:2;margin-top:10px;font-size:22px;font-weight:1000;color:#9fe1ff;text-shadow:0 0 8px rgba(70,170,255,.55)}.nav{position:relative;z-index:2;display:flex;justify-content:center;gap:8px;margin-top:13px}.nav button{border:1px solid rgba(105,185,255,.38);background:linear-gradient(180deg,#12345c,#071526);color:#fff;border-radius:999px;padding:9px 14px;font-size:12px;font-weight:1000;cursor:pointer}.main{display:flex;flex-direction:column;gap:13px;margin-top:13px}.card{border:1px solid rgba(90,175,255,.45);border-radius:18px;background:linear-gradient(180deg,rgba(8,21,37,.95),rgba(4,12,26,.96));box-shadow:0 0 14px rgba(47,155,255,.18);overflow:hidden}.card-head{padding:14px 12px;background:linear-gradient(180deg,#12345c,#071526);border-bottom:2px solid rgba(80,190,255,.82);text-align:center}.card-head h2{margin:0;color:#fff;font-size:20px;font-weight:1000;text-shadow:0 0 8px rgba(80,170,255,.85),0 2px 0 #000}.card-body{padding:12px}.week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.daybox,.text-box,.cal-day{border:1px solid rgba(90,175,255,.27);background:linear-gradient(180deg,rgba(45,145,255,.10),rgba(0,0,0,.26));border-radius:15px;cursor:pointer;box-shadow:inset 0 0 14px rgba(255,255,255,.025)}.daybox:hover,.text-box:hover,.cal-day:hover{outline:2px solid rgba(110,215,255,.55)}.daybox{height:128px;padding:9px 5px;text-align:center;display:flex;flex-direction:column;align-items:center;overflow:hidden}.dow{width:100%;font-size:13px;font-weight:1000;color:#9ccfff}.dow.sun,.week-labels div:first-child,.num.sun,.num.holiday{color:#ff6b8a}.dow.sat,.week-labels div:last-child,.num.sat{color:#6ed7ff}.day-text{width:100%;flex:1;margin-top:8px;color:#fff;font-size:15px;font-weight:1000;line-height:1.25;white-space:pre-wrap;word-break:keep-all;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;text-shadow:0 1px 0 #000}.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.today-label{margin:0 0 7px;color:#9ccfff;font-size:13px;font-weight:1000}.today-date{text-align:center;color:#ffd34f;font-size:14px;font-weight:1000;margin:-2px 0 12px}.text-box{min-height:155px;padding:14px;color:#fff;font-size:16px;font-weight:900;line-height:1.45;white-space:pre-wrap;word-break:keep-all;overflow:hidden}.week-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:8px;text-align:center;color:#9ccfff;font-size:13px;font-weight:1000}.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px}.cal-day{height:104px;padding:8px;overflow:hidden}.cal-day.empty{visibility:hidden}.cal-day.selected{border-color:#ffd34f;background:linear-gradient(180deg,rgba(255,211,79,.18),rgba(0,0,0,.22));box-shadow:0 0 12px rgba(255,211,79,.18)}.num{font-size:16px;font-weight:1000;color:#fff;margin-bottom:5px}.cal-text{color:#fff;font-size:12px;font-weight:900;line-height:1.24;white-space:pre-wrap;word-break:keep-all;max-height:72px;overflow:hidden;text-shadow:0 1px 0 #000}.modal-back{position:fixed;inset:0;background:rgba(0,7,18,.70);display:none;align-items:center;justify-content:center;z-index:999999;padding:16px}.modal{width:min(520px,100%);background:linear-gradient(180deg,#081a31,#050b17);border:1px solid rgba(110,215,255,.55);border-radius:22px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.45),0 0 24px rgba(47,155,255,.22);color:#fff}.modal h3{margin:0 0 9px;font-size:23px;font-weight:1000}.modal-sub{margin-bottom:10px;color:#9ccfff;font-size:13px;font-weight:900}.modal textarea,.modal input{width:100%;border:1px solid rgba(110,215,255,.38);border-radius:15px;background:#061326;color:#fff;padding:13px;font-weight:900;outline:none}.modal textarea{min-height:170px;resize:vertical;line-height:1.45}.modal-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}.action{border:0;border-radius:14px;padding:13px 10px;font-weight:1000;cursor:pointer}.primary{background:linear-gradient(135deg,#2f9bff,#635bff);color:#fff}.danger{background:linear-gradient(135deg,#ff5d8f,#d7275d);color:#fff}.ghost{background:#11243d;color:#ccecff;border:1px solid rgba(110,215,255,.25)}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:1000000;background:#102b52;color:#fff;padding:12px 16px;border-radius:999px;font-weight:1000;opacity:0;pointer-events:none;transition:.2s;box-shadow:0 0 18px rgba(47,155,255,.25)}.toast.show{opacity:1}.watermark{margin:10px 0 2px;text-align:center;color:#7ec8ff;font-size:10px;font-weight:800;text-shadow:0 0 6px rgba(80,170,255,.35)}
@media(max-width:680px){.cnine-schedule{padding:7px;border-radius:16px}.hero{padding:14px 9px}.top-actions{position:relative;right:auto;top:auto;justify-content:center;margin-bottom:9px}.logo-box{width:76px;height:76px;border-radius:22px}.title{font-size:23px}.month-line{font-size:19px}.nav button{padding:8px 11px}.card-head h2{font-size:18px}.card-body{padding:9px}.week-grid{gap:5px}.daybox{height:94px;border-radius:12px;padding:7px 2px}.dow{font-size:11px}.day-text{font-size:11px;line-height:1.15;word-break:break-all}.today-grid{grid-template-columns:1fr;gap:10px}.text-box{min-height:120px;font-size:14px}.calendar{gap:5px}.week-labels{gap:5px;font-size:12px}.cal-day{height:76px;border-radius:11px;padding:6px 3px}.num{font-size:14px;margin-bottom:3px}.cal-text{font-size:9px;line-height:1.12;max-height:50px;word-break:break-all}.modal-actions{grid-template-columns:1fr}.modal h3{font-size:21px}}
@media(max-width:390px){.title{font-size:20px}.sub-title{font-size:11px}.daybox{height:84px}.day-text{font-size:10px}.cal-day{height:70px}.cal-text{font-size:8.5px}}
</style>
</head>
<body>
<div class="cnine-schedule" id="cnineScheduleRoot">
  <header class="hero">
    <div class="top-actions">
      <button id="changePasswordBtn" type="button">비밀번호 변경</button>
      <button id="saveBtn" type="button">저장</button>
    </div>
    <div class="logo-box"><img id="cnineLogo" src="https://keyman1335-maker.github.io/poong-rank/assets/crew_logos/cninelogo.png?v=9999" onerror="this.src='./assets/cnine_logo_fallback.svg'" alt="CNINE"></div>
    <div class="title">CNINE SCHEDULE CENTER</div>
    <div class="sub-title">씨나인 일정 센터</div>
    <div class="month-line" id="heroMonth">0000년 0월</div>
    <div class="nav"><button id="prevBtn" type="button">‹ 이전</button><button id="todayBtn" type="button">오늘</button><button id="nextBtn" type="button">다음 ›</button></div>
  </header>
  <main class="main">
    <section class="card">
      <div class="card-head"><h2>👑 철구(수장) 주간 스케줄</h2></div>
      <div class="card-body"><div class="week-grid" id="weeklyGrid"></div></div>
    </section>
    <section class="card">
      <div class="card-head"><h2>📌 오늘의 일정</h2></div>
      <div class="card-body">
        <div class="today-date" id="todayDate">0000.00.00</div>
        <div class="today-grid">
          <div><div class="today-label">오늘의 일정</div><div class="text-box fit-text" id="todaySchedule" data-edit="todaySchedule">등록된 일정 없음</div></div>
          <div><div class="today-label">공지사항</div><div class="text-box fit-text" id="todayNotice" data-edit="todayNotice">등록된 공지사항 없음</div></div>
        </div>
      </div>
    </section>
    <section class="card">
      <div class="card-head"><h2 id="calendarTitle">📅 크루 월간 스케줄</h2></div>
      <div class="card-body">
        <div class="week-labels"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
        <div class="calendar" id="calendar"></div>
      </div>
    </section>
  </main>
  <div class="watermark">CNINE Schedule Center Developed by 유두위생크림</div>
</div>
<div class="modal-back" id="modalBack"><div class="modal"><h3 id="modalTitle">수정</h3><div class="modal-sub" id="modalSub"></div><textarea id="modalText" placeholder="표시할 텍스트를 입력하세요"></textarea><div class="modal-actions"><button class="action ghost" id="cancelBtn" type="button">취소</button><button class="action danger" id="clearBtn" type="button">비우기</button><button class="action primary" id="applyBtn" type="button">적용</button></div></div></div>
<div class="modal-back" id="passwordBack"><div class="modal"><h3>관리자 저장</h3><div class="modal-sub">비밀번호를 입력하면 현재 일정이 저장됩니다.</div><input id="adminPassword" type="password" placeholder="관리자 비밀번호" autocomplete="current-password"><div class="modal-actions" style="grid-template-columns:1fr 1fr"><button class="action ghost" id="passwordCancelBtn" type="button">취소</button><button class="action primary" id="passwordSaveBtn" type="button">저장</button></div></div></div>
<div class="modal-back" id="changePasswordBack"><div class="modal"><h3>비밀번호 변경</h3><div class="modal-sub">현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</div><input id="currentPassword" type="password" placeholder="현재 비밀번호" autocomplete="current-password" style="margin-bottom:9px"><input id="newPassword" type="password" placeholder="새 비밀번호" autocomplete="new-password" style="margin-bottom:9px"><input id="newPasswordConfirm" type="password" placeholder="새 비밀번호 확인" autocomplete="new-password"><div class="modal-actions" style="grid-template-columns:1fr 1fr"><button class="action ghost" id="changePasswordCancelBtn" type="button">취소</button><button class="action primary" id="changePasswordApplyBtn" type="button">변경</button></div></div></div>
<div class="toast" id="toast">완료</div>
<script>
(function(){
const dows=['일','월','화','수','목','금','토'];
const todayReal=new Date();
let view=new Date(todayReal.getFullYear(), todayReal.getMonth(), 1);
let selectedDate=dateKey(todayReal.getFullYear(), todayReal.getMonth()+1, todayReal.getDate());
let editCtx=null;
const DEFAULT_DATA={weekly:{chulgu:['방송','방송','방송','방송','방송','방송','방송']},today:{schedule:'등록된 일정 없음',notice:'등록된 공지사항 없음'},monthly:{}};
let data=cloneObj(DEFAULT_DATA);
let adminPasswordHash='';
function cloneObj(obj){return JSON.parse(JSON.stringify(obj));}
async function sha256Client(text){const enc=new TextEncoder().encode(String(text||''));const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
const $=id=>document.getElementById(id);
const heroMonth=$('heroMonth'), calendarTitle=$('calendarTitle'), weeklyGrid=$('weeklyGrid'), todayDate=$('todayDate'), todaySchedule=$('todaySchedule'), todayNotice=$('todayNotice'), calendar=$('calendar');
const modalBack=$('modalBack'), modalTitle=$('modalTitle'), modalSub=$('modalSub'), modalText=$('modalText'), cancelBtn=$('cancelBtn'), clearBtn=$('clearBtn'), applyBtn=$('applyBtn');
const passwordBack=$('passwordBack'), adminPassword=$('adminPassword'), passwordCancelBtn=$('passwordCancelBtn'), passwordSaveBtn=$('passwordSaveBtn');
const changePasswordBtn=$('changePasswordBtn'), saveBtn=$('saveBtn'), prevBtn=$('prevBtn'), todayBtn=$('todayBtn'), nextBtn=$('nextBtn');
const changePasswordBack=$('changePasswordBack'), currentPassword=$('currentPassword'), newPassword=$('newPassword'), newPasswordConfirm=$('newPasswordConfirm'), changePasswordCancelBtn=$('changePasswordCancelBtn'), changePasswordApplyBtn=$('changePasswordApplyBtn');
function pad(n){return String(n).padStart(2,'0')}
function dateKey(y,m,d){return `${y}-${pad(m)}-${pad(d)}`}
function dot(k){return String(k).replaceAll('-','.')}
function esc(s=''){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function cleanLoaded(raw){const src=raw && raw.data ? raw.data : raw; const weekly=src?.weekly?.chulgu || src?.weekly?.kim || DEFAULT_DATA.weekly.chulgu; return {weekly:{chulgu:Array.isArray(weekly)?weekly.slice(0,7):cloneObj(DEFAULT_DATA.weekly.chulgu)},today:{schedule:src?.today?.schedule||'등록된 일정 없음',notice:src?.today?.notice||src?.today?.mention||'등록된 공지사항 없음'},monthly:src?.monthly && typeof src.monthly==='object'?src.monthly:{}};}
async function loadSchedule(){const urls=['/.netlify/functions/save-schedule?ts='+Date.now(),'./data/schedule.json?ts='+Date.now(),'/data/schedule.json?ts='+Date.now()];for(const url of urls){try{const res=await fetch(url,{cache:'no-store'});if(!res.ok)continue;const raw=await res.json();adminPasswordHash=raw.adminPasswordHash||'';data=cleanLoaded(raw);renderAll();return;}catch(e){}}try{const saved=localStorage.getItem('cnineScheduleCenterData');if(saved)data=cleanLoaded(JSON.parse(saved));}catch(e){}renderAll();}
function isKoreanNationalDay(m,d,y=view.getFullYear()){const md=`${pad(m)}-${pad(d)}`;const fixed=['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];const byYear={2026:['02-16','02-17','02-18','05-24','09-24','09-25','09-26'],2027:['02-06','02-07','02-08','05-13','09-14','09-15','09-16'],2028:['01-26','01-27','01-28','05-02','10-02','10-03','10-04']};return fixed.includes(md)||(byYear[y]||[]).includes(md);}
function showToast(t){const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700)}
function renderHeader(){const label=view.getFullYear()+'년 '+(view.getMonth()+1)+'월';heroMonth.textContent=label;if(calendarTitle)calendarTitle.textContent='📅 크루 월간 스케줄 ('+label+')';}
function renderWeekly(){weeklyGrid.innerHTML='';dows.forEach((d,i)=>{const cls=i===0?'sun':i===6?'sat':'';const el=document.createElement('div');el.className='daybox';el.dataset.day=i;el.innerHTML=`<div class="dow ${cls}">${d}</div><div class="day-text fit-text">${esc(data.weekly.chulgu[i]||'')}</div>`;el.onclick=()=>openModal({type:'weekly',day:i});weeklyGrid.appendChild(el);});requestAnimationFrame(autoFitTexts);}
function renderToday(){todayDate.textContent=dot(selectedDate);todaySchedule.textContent=data.today.schedule||'등록된 일정 없음';todayNotice.textContent=data.today.notice||'등록된 공지사항 없음';}
function renderCalendar(){renderHeader();calendar.innerHTML='';const y=view.getFullYear(),m=view.getMonth()+1;const first=new Date(y,m-1,1).getDay();const last=new Date(y,m,0).getDate();for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';calendar.appendChild(e)}for(let d=1;d<=last;d++){const k=dateKey(y,m,d);const dow=new Date(y,m-1,d).getDay();const numCls=isKoreanNationalDay(m,d,y)?'holiday':dow===0?'sun':dow===6?'sat':'';const el=document.createElement('div');el.className='cal-day'+(k===selectedDate?' selected':'');el.innerHTML=`<div class="num ${numCls}">${d}</div><div class="cal-text fit-text">${esc(data.monthly[k]||'')}</div>`;el.onclick=()=>{selectedDate=k;renderToday();renderCalendar();openModal({type:'monthly',date:k});};calendar.appendChild(el)}requestAnimationFrame(autoFitTexts)}
function autoFitTexts(){document.querySelectorAll('#cnineScheduleRoot .fit-text').forEach(el=>{let base=el.classList.contains('cal-text')?12:el.classList.contains('day-text')?15:16;let min=8;if(window.matchMedia('(max-width:680px)').matches){base=el.classList.contains('cal-text')?9:el.classList.contains('day-text')?11:14;min=el.classList.contains('cal-text')?7:8}let size=base;el.style.fontSize=size+'px';el.style.lineHeight=el.classList.contains('cal-text')?'1.18':el.classList.contains('day-text')?'1.18':'1.35';while((el.scrollHeight>el.clientHeight || el.scrollWidth>el.clientWidth) && size>min){size-=0.5;el.style.fontSize=size+'px';}if(el.classList.contains('day-text') && (el.scrollHeight>el.clientHeight || el.scrollWidth>el.clientWidth)){el.style.wordBreak='break-all';el.style.overflowWrap='anywhere';}})}
function renderAll(){renderWeekly();renderToday();renderCalendar();}
function openModal(ctx){editCtx=ctx;let title='입력/수정',sub='',val='';if(ctx.type==='weekly'){title='철구(수장) 주간 스케줄 수정';sub=dows[ctx.day]+'요일';val=data.weekly.chulgu[ctx.day]||''}if(ctx.type==='todaySchedule'){title='오늘의 일정 수정';sub='오늘의 일정';val=data.today.schedule||''}if(ctx.type==='todayNotice'){title='공지사항 수정';sub='공지사항';val=data.today.notice||''}if(ctx.type==='monthly'){title='크루 월간 스케줄 수정';sub=dot(ctx.date);val=data.monthly[ctx.date]||''}modalTitle.textContent=title;modalSub.textContent=sub;modalText.value=val;modalBack.style.display='flex';setTimeout(()=>modalText.focus(),50)}
function closeModal(){modalBack.style.display='none';editCtx=null}
function applyModal(clear=false){if(!editCtx)return;const v=clear?'':modalText.value.trim();if(editCtx.type==='weekly')data.weekly.chulgu[editCtx.day]=v;if(editCtx.type==='todaySchedule')data.today.schedule=v;if(editCtx.type==='todayNotice')data.today.notice=v;if(editCtx.type==='monthly'){if(v)data.monthly[editCtx.date]=v;else delete data.monthly[editCtx.date]}renderAll();closeModal();showToast(clear?'비움 완료':'수정 완료')}
async function saveToServer(password,newPassword=''){const payload={password,data};if(newPassword)payload.newPassword=newPassword;const res=await fetch('/.netlify/functions/save-schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const json=await res.json().catch(()=>({}));if(!res.ok)throw new Error(json.error||'저장 실패');localStorage.setItem('cnineScheduleCenterData',JSON.stringify(data));return json;}
todaySchedule.onclick=()=>openModal({type:'todaySchedule'});todayNotice.onclick=()=>openModal({type:'todayNotice'});cancelBtn.onclick=closeModal;applyBtn.onclick=()=>applyModal(false);clearBtn.onclick=()=>applyModal(true);modalBack.onclick=e=>{if(e.target===modalBack)closeModal()};
prevBtn.onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()-1,1);renderCalendar()};nextBtn.onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()+1,1);renderCalendar()};todayBtn.onclick=()=>{view=new Date(todayReal.getFullYear(),todayReal.getMonth(),1);selectedDate=dateKey(todayReal.getFullYear(),todayReal.getMonth()+1,todayReal.getDate());renderAll()};
saveBtn.onclick=()=>{passwordBack.style.display='flex';adminPassword.value='';setTimeout(()=>adminPassword.focus(),50)};passwordCancelBtn.onclick=()=>passwordBack.style.display='none';passwordBack.onclick=e=>{if(e.target===passwordBack)passwordBack.style.display='none'};
async function doProtectedSave(){try{passwordSaveBtn.disabled=true;passwordSaveBtn.textContent='확인 중';if(adminPasswordHash){const inputHash=await sha256Client(adminPassword.value);if(inputHash!==adminPasswordHash){showToast('비밀번호가 틀렸습니다.');return}}passwordSaveBtn.textContent='저장 중';const result=await saveToServer(adminPassword.value);if(result.adminPasswordHash)adminPasswordHash=result.adminPasswordHash;passwordBack.style.display='none';showToast('저장 완료')}catch(e){showToast(e.message)}finally{passwordSaveBtn.disabled=false;passwordSaveBtn.textContent='저장'}}
passwordSaveBtn.onclick=doProtectedSave;adminPassword.addEventListener('keydown',e=>{if(e.key==='Enter')doProtectedSave()});
changePasswordBtn.onclick=()=>{changePasswordBack.style.display='flex';currentPassword.value='';newPassword.value='';newPasswordConfirm.value='';setTimeout(()=>currentPassword.focus(),50)};changePasswordCancelBtn.onclick=()=>changePasswordBack.style.display='none';changePasswordBack.onclick=e=>{if(e.target===changePasswordBack)changePasswordBack.style.display='none'};
async function doChangePassword(){const cur=currentPassword.value;const next=newPassword.value.trim();const confirm=newPasswordConfirm.value.trim();if(!next){showToast('새 비밀번호를 입력하세요');return}if(next.length<4){showToast('비밀번호는 4자 이상');return}if(next!==confirm){showToast('새 비밀번호가 일치하지 않습니다');return}try{changePasswordApplyBtn.disabled=true;changePasswordApplyBtn.textContent='확인 중';if(adminPasswordHash){const inputHash=await sha256Client(cur);if(inputHash!==adminPasswordHash){showToast('현재 비밀번호가 틀렸습니다.');return}}changePasswordApplyBtn.textContent='변경 중';const result=await saveToServer(cur,next);if(result.adminPasswordHash)adminPasswordHash=result.adminPasswordHash;changePasswordBack.style.display='none';showToast('비밀번호 변경 완료')}catch(e){showToast(e.message)}finally{changePasswordApplyBtn.disabled=false;changePasswordApplyBtn.textContent='변경'}}
changePasswordApplyBtn.onclick=doChangePassword;[currentPassword,newPassword,newPasswordConfirm].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doChangePassword()}));
loadSchedule();
})();
